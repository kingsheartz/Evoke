# Production overrides — use with: scripts/run.* prod up
# Dev bind mounts and hot reload are disabled; frontend uses Dockerfile.prod.

services:
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.prod
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8000/api/v1}
        NEXT_PUBLIC_APP_NAME: ${NEXT_PUBLIC_APP_NAME:-Evoke}
        NEXT_PUBLIC_HOME_VARIANT: ${NEXT_PUBLIC_HOME_VARIANT:-motion}
        NEXT_PUBLIC_HOME_VARIANT_SWITCH: ${NEXT_PUBLIC_HOME_VARIANT_SWITCH:-true}
        NEXT_PUBLIC_MEDIA_BASE_URL: ${NEXT_PUBLIC_MEDIA_BASE_URL:-}
    environment:
      - NODE_ENV=production
      - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL:-http://localhost:8000/api/v1}
      - NEXT_PUBLIC_HOME_VARIANT=${NEXT_PUBLIC_HOME_VARIANT:-motion}
      - NEXT_PUBLIC_HOME_VARIANT_SWITCH=${NEXT_PUBLIC_HOME_VARIANT_SWITCH:-true}
      - NEXT_PUBLIC_MEDIA_BASE_URL=${NEXT_PUBLIC_MEDIA_BASE_URL:-}
      - INTERNAL_API_URL=http://backend:8000/api/v1
      - NEXT_TELEMETRY_DISABLED=1
    volumes: !reset []
    command: ["node", "server.js"]
    restart: unless-stopped

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.prod
    environment:
      - APP_ENV=production
      - APP_DEBUG=false
      - FILESYSTEM_DISK=${FILESYSTEM_DISK:-public}
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID:-}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY:-}
      - AWS_DEFAULT_REGION=${AWS_DEFAULT_REGION:-ap-south-1}
      - AWS_BUCKET=${AWS_BUCKET:-}
      - AWS_URL=${AWS_URL:-}
      - SEED_DEMO=${SEED_DEMO:-true}
    volumes: !reset []
    restart: unless-stopped

  queue-worker:
    build:
      context: ./backend
      dockerfile: Dockerfile.prod
    volumes: !reset []
    environment:
      - APP_ENV=production
    restart: unless-stopped

  scheduler:
    build:
      context: ./backend
      dockerfile: Dockerfile.prod
    volumes: !reset []
    environment:
      - APP_ENV=production
    restart: unless-stopped
