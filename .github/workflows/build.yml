name: Build

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

env:
  NEXT_PUBLIC_API_URL: http://localhost:8000/api/v1
  NEXT_PUBLIC_APP_NAME: Evoke

jobs:
  frontend:
    name: Frontend lint & build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build
        env:
          NEXT_TELEMETRY_DISABLED: 1

  backend:
    name: Backend install & autoload
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - uses: shivammathur/setup-php@v2
        with:
          php-version: "8.4"
          extensions: mbstring, bcmath, pdo_mysql, pdo_pgsql, zip
          coverage: none

      - name: Install Composer dependencies
        run: composer install --no-interaction --prefer-dist

      - name: Prepare environment
        run: |
          cp .env.example .env
          php artisan key:generate --force

      - name: Validate autoload & config
        run: |
          php artisan config:clear
          php artisan route:list --compact

  docker:
    name: Docker build smoke test
    runs-on: ubuntu-latest
    needs: [frontend, backend]
    if: github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4

      - name: Build frontend image
        run: |
          docker build \
            -f frontend/Dockerfile.prod \
            --build-arg NEXT_PUBLIC_API_URL="${{ env.NEXT_PUBLIC_API_URL }}" \
            --build-arg NEXT_PUBLIC_APP_NAME="${{ env.NEXT_PUBLIC_APP_NAME }}" \
            -t evoke-frontend:ci \
            frontend

      - name: Build backend image
        run: docker build -f backend/Dockerfile.prod -t evoke-backend:ci backend
