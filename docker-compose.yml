services:
  nginx:
    image: nginx:alpine
    ports:
      - "8080:80"
    volumes:
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - frontend
      - backend
    networks:
      - evoke-network
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000/api/v1
      - INTERNAL_API_URL=http://backend:8000/api/v1
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next
    depends_on:
      - backend
    networks:
      - evoke-network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      - APP_ENV=local
      - APP_KEY=base64:2fl+KtvkAGL8OuGzJmHj4zgnZqZKhK8YN8xPEqQ8V0k=
      - APP_DEBUG=true
      - DB_CONNECTION=pgsql
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_DATABASE=evoke
      - DB_USERNAME=evoke
      - DB_PASSWORD=evoke_secret
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - CACHE_STORE=redis
      - QUEUE_CONNECTION=redis
      - SESSION_DRIVER=redis
      - AI_SERVICE_URL=http://ai-service:8001
    volumes:
      - ./backend:/var/www/html
      - /var/www/html/vendor
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    networks:
      - evoke-network
    restart: unless-stopped

  ai-service:
    build:
      context: ./ai-service
      dockerfile: Dockerfile
    ports:
      - "8001:8001"
    environment:
      - DATABASE_URL=postgresql://evoke:evoke_secret@postgres:5432/evoke
      - OLLAMA_HOST=http://ollama:11434
      - OLLAMA_MODEL=qwen3
      - EMBEDDING_MODEL=nomic-embed-text
    depends_on:
      - postgres
      - ollama
    networks:
      - evoke-network

  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    networks:
      - evoke-network

  postgres:
    image: pgvector/pgvector:pg16
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: evoke
      POSTGRES_USER: evoke
      POSTGRES_PASSWORD: evoke_secret
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U evoke -d evoke"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - evoke-network

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - evoke-network

  queue-worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: php artisan queue:work redis --sleep=3 --tries=3
    environment:
      - APP_ENV=local
      - APP_KEY=base64:2fl+KtvkAGL8OuGzJmHj4zgnZqZKhK8YN8xPEqQ8V0k=
      - DB_CONNECTION=pgsql
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_DATABASE=evoke
      - DB_USERNAME=evoke
      - DB_PASSWORD=evoke_secret
      - REDIS_HOST=redis
      - QUEUE_CONNECTION=redis
    volumes:
      - ./backend:/var/www/html
      - /var/www/html/vendor
    depends_on:
      - backend
      - redis
    networks:
      - evoke-network
    restart: unless-stopped

  scheduler:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: sh -c "while true; do php artisan schedule:run; sleep 60; done"
    environment:
      - APP_ENV=local
      - APP_KEY=base64:2fl+KtvkAGL8OuGzJmHj4zgnZqZKhK8YN8xPEqQ8V0k=
      - DB_CONNECTION=pgsql
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_DATABASE=evoke
      - DB_USERNAME=evoke
      - DB_PASSWORD=evoke_secret
      - REDIS_HOST=redis
    volumes:
      - ./backend:/var/www/html
      - /var/www/html/vendor
    depends_on:
      - backend
    networks:
      - evoke-network
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
  ollama_data:

networks:
  evoke-network:
    driver: bridge
