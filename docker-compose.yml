# Optional services use Compose profiles — start stacks via scripts/run.* (see RUN.md).
# Profiles: pgsql | mysql | proxy | workers | ai
services:
  nginx:
    profiles: ["proxy", "full"]
    image: nginx:alpine
    ports:
      - "8080:80"
    volumes:
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - frontend
      - backend
    networks:
      - evoke-network
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000/api/v1
      - INTERNAL_API_URL=http://backend:8000/api/v1
      - NEXT_TELEMETRY_DISABLED=1
      # Turbopack (default in package.json dev script) — faster route compiles than webpack.
      # Windows bind mounts: polling keeps HMR reliable inside Docker.
      - WATCHPACK_POLLING=true
      - CHOKIDAR_USEPOLLING=true
      - WATCHPACK_POLLING_INTERVAL=1000
    volumes:
      - ./frontend:/app
      # Keep node_modules inside the container (Linux binaries). Do NOT mount
      # /app/.next — a separate .next volume causes stale UI after code changes.
      - /app/node_modules
    depends_on:
      - backend
    networks:
      - evoke-network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      - APP_ENV=local
      - APP_KEY=base64:2fl+KtvkAGL8OuGzJmHj4zgnZqZKhK8YN8xPEqQ8V0k=
      - APP_DEBUG=true
      - DB_CONNECTION=${DB_CONNECTION:-pgsql}
      - DB_HOST=${DB_HOST:-postgres}
      - DB_PORT=${DB_PORT:-5432}
      - DB_DATABASE=${DB_DATABASE:-evoke}
      - DB_USERNAME=${DB_USERNAME:-evoke}
      - DB_PASSWORD=${DB_PASSWORD:-evoke_secret}
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - CACHE_STORE=redis
      - QUEUE_CONNECTION=redis
      - SESSION_DRIVER=redis
      - AI_SERVICE_URL=http://ai-service:8001
    volumes:
      - ./backend:/var/www/html
      - /var/www/html/vendor
    depends_on:
      postgres:
        condition: service_healthy
        required: false
      mysql:
        condition: service_healthy
        required: false
      redis:
        condition: service_started
    networks:
      - evoke-network
    restart: unless-stopped

  ai-service:
    profiles: ["ai", "full"]
    build:
      context: ./ai-service
      dockerfile: Dockerfile
    ports:
      - "8001:8001"
    environment:
      - DATABASE_URL=postgresql://evoke:evoke_secret@postgres:5432/evoke
      - OLLAMA_HOST=http://ollama:11434
      - OLLAMA_MODEL=qwen3
      - EMBEDDING_MODEL=nomic-embed-text
    depends_on:
      - postgres
      - ollama
    networks:
      - evoke-network

  ollama:
    profiles: ["ai", "full"]
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    networks:
      - evoke-network

  postgres:
    profiles: ["pgsql", "full", "ai"]
    image: pgvector/pgvector:pg16
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: evoke
      POSTGRES_USER: evoke
      POSTGRES_PASSWORD: evoke_secret
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U evoke -d evoke"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - evoke-network

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - evoke-network

  # MySQL — lighter stack (scripts/run.* stack: mysql)
  mysql:
    profiles: ["mysql"]
    image: mysql:8.4
    ports:
      - "3306:3306"
    environment:
      MYSQL_DATABASE: evoke
      MYSQL_USER: evoke
      MYSQL_PASSWORD: evoke_secret
      MYSQL_ROOT_PASSWORD: evoke_root
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uevoke", "-pevoke_secret"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - evoke-network

  queue-worker:
    profiles: ["workers", "full"]
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: php artisan queue:work redis --sleep=3 --tries=3
    environment:
      - APP_ENV=local
      - APP_KEY=base64:2fl+KtvkAGL8OuGzJmHj4zgnZqZKhK8YN8xPEqQ8V0k=
      - DB_CONNECTION=${DB_CONNECTION:-pgsql}
      - DB_HOST=${DB_HOST:-postgres}
      - DB_PORT=${DB_PORT:-5432}
      - DB_DATABASE=${DB_DATABASE:-evoke}
      - DB_USERNAME=${DB_USERNAME:-evoke}
      - DB_PASSWORD=${DB_PASSWORD:-evoke_secret}
      - REDIS_HOST=redis
      - QUEUE_CONNECTION=redis
    volumes:
      - ./backend:/var/www/html
      - /var/www/html/vendor
    depends_on:
      - backend
      - redis
    networks:
      - evoke-network
    restart: unless-stopped

  scheduler:
    profiles: ["workers", "full"]
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: sh -c "while true; do php artisan schedule:run; sleep 60; done"
    environment:
      - APP_ENV=local
      - APP_KEY=base64:2fl+KtvkAGL8OuGzJmHj4zgnZqZKhK8YN8xPEqQ8V0k=
      - DB_CONNECTION=${DB_CONNECTION:-pgsql}
      - DB_HOST=${DB_HOST:-postgres}
      - DB_PORT=${DB_PORT:-5432}
      - DB_DATABASE=${DB_DATABASE:-evoke}
      - DB_USERNAME=${DB_USERNAME:-evoke}
      - DB_PASSWORD=${DB_PASSWORD:-evoke_secret}
      - REDIS_HOST=redis
    volumes:
      - ./backend:/var/www/html
      - /var/www/html/vendor
    depends_on:
      - backend
    networks:
      - evoke-network
    restart: unless-stopped

volumes:
  postgres_data:
  mysql_data:
  redis_data:
  ollama_data:

networks:
  evoke-network:
    driver: bridge
