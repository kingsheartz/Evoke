AWSTemplateFormatVersion: "2010-09-09"
Description: IAM role for GitHub Actions OIDC — build, push to ECR, deploy via SSM.

Parameters:
  GitHubOrg:
    Type: String
    Description: GitHub organization or user name
  GitHubRepo:
    Type: String
    Default: Evoke
  ProjectName:
    Type: String
    Default: evoke

Resources:
  GitHubOidcProvider:
    Type: AWS::IAM::OIDCProvider
    Properties:
      Url: https://token.actions.githubusercontent.com
      ClientIdList:
        - sts.amazonaws.com
      ThumbprintList:
        - 6938fd4d98bab03faad878375eb6daa7a4d2c4c4

  GitHubActionsDeployRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub "${ProjectName}-github-actions-deploy"
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Federated: !GetAtt GitHubOidcProvider.Arn
            Action: sts:AssumeRoleWithWebIdentity
            Condition:
              StringEquals:
                token.actions.githubusercontent.com:aud: sts.amazonaws.com
              StringLike:
                token.actions.githubusercontent.com:sub: !Sub "repo:${GitHubOrg}/${GitHubRepo}:*"
      Policies:
        - PolicyName: EvokeGitHubDeploy
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - ecr:GetAuthorizationToken
                Resource: "*"
              - Effect: Allow
                Action:
                  - ecr:BatchCheckLayerAvailability
                  - ecr:CompleteLayerUpload
                  - ecr:InitiateLayerUpload
                  - ecr:PutImage
                  - ecr:UploadLayerPart
                  - ecr:DescribeRepositories
                  - ecr:CreateRepository
                Resource:
                  - !Sub "arn:aws:ecr:${AWS::Region}:${AWS::AccountId}:repository/evoke-frontend"
                  - !Sub "arn:aws:ecr:${AWS::Region}:${AWS::AccountId}:repository/evoke-backend"
              - Effect: Allow
                Action:
                  - ssm:SendCommand
                  - ssm:GetCommandInvocation
                  - ssm:ListCommandInvocations
                Resource: "*"
              - Effect: Allow
                Action:
                  - ec2:DescribeInstances
                Resource: "*"

Outputs:
  RoleArn:
    Description: Set as GitHub repository variable AWS_DEPLOY_ROLE_ARN
    Value: !GetAtt GitHubActionsDeployRole.Arn
