# AWS EC2 production stack — images from ECR, MySQL for free-tier memory budget.
# Configure via infra/aws/config/deploy.env (see deploy.env.example).

name: evoke-aws

services:
  nginx:
    image: nginx:1.27-alpine
    ports:
      - "${HTTP_PORT:-80}:80"
    volumes:
      - ../../docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      frontend:
        condition: service_started
      backend:
        condition: service_started
    networks:
      - evoke-network
    restart: unless-stopped

  frontend:
    image: ${ECR_REGISTRY}/evoke-frontend:${IMAGE_TAG:-latest}
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
      NEXT_PUBLIC_APP_NAME: ${NEXT_PUBLIC_APP_NAME:-Evoke}
      INTERNAL_API_URL: http://backend:8000/api/v1
    depends_on:
      - backend
    networks:
      - evoke-network
    restart: unless-stopped

  backend:
    image: ${ECR_REGISTRY}/evoke-backend:${IMAGE_TAG:-latest}
    env_file:
      - backend.runtime.env
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_started
    networks:
      - evoke-network
    restart: unless-stopped

  queue-worker:
    image: ${ECR_REGISTRY}/evoke-backend:${IMAGE_TAG:-latest}
    command: php artisan queue:work redis --sleep=3 --tries=3
    env_file:
      - backend.runtime.env
    depends_on:
      - backend
      - redis
    networks:
      - evoke-network
    restart: unless-stopped

  scheduler:
    image: ${ECR_REGISTRY}/evoke-backend:${IMAGE_TAG:-latest}
    command: sh -c "while true; do php artisan schedule:run; sleep 60; done"
    env_file:
      - backend.runtime.env
    depends_on:
      - backend
    networks:
      - evoke-network
    restart: unless-stopped

  mysql:
    image: mysql:8.4
    environment:
      MYSQL_DATABASE: ${DB_DATABASE:-evoke}
      MYSQL_USER: ${DB_USERNAME:-evoke}
      MYSQL_PASSWORD: ${DB_PASSWORD:?Set DB_PASSWORD in deploy.env}
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-${DB_PASSWORD}}
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u${DB_USERNAME:-evoke}", "-p${DB_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - evoke-network
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    volumes:
      - redis_data:/data
    networks:
      - evoke-network
    restart: unless-stopped

volumes:
  mysql_data:
  redis_data:

networks:
  evoke-network:
    driver: bridge
